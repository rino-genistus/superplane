name: Frontend CI

# Dispatchable by SuperPlane (workflow_dispatch) AND auto-runs on the agent's PRs
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/ref to verify (the code agent's PR branch)"
        required: false
        default: ""
  pull_request:
    paths:
      - "web_src/**"
      - ".github/workflows/ci.yml"

# Cancel superseded runs on the same ref to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_src
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On manual dispatch, check out the ref passed in; otherwise default behavior
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web_src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build
        run: npm run build      # tsc -b && vite build — fails on type errors or broken build

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run   # vitest run (non-watch)
